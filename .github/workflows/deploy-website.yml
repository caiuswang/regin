name: Deploy Website

on:
  push:
    branches: [master]
    paths:
      - 'website/**'
      - '!website/**/*.md'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build site
        run: npm run build
        working-directory: website

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -rlvz --delete --omit-dir-times --no-perms
          path: website/dist/
          remote_path: /var/www/regin-website/
          remote_host: ${{ secrets.REGIN_SERVER_HOST }}
          remote_user: ${{ secrets.REGIN_SERVER_USER }}
          remote_key: ${{ secrets.REGIN_SSH_PRIVATE_KEY }}
