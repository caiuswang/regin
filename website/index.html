    <!-- Non-blocking font load: render proceeds on the metric-matched fallback
         stack if fonts.googleapis.com is slow or unreachable. Atkinson
         Hyperlegible Next ships as one variable file (wght 400-800), so the
         650/750 heading weights render as true instances, not 700/800 snaps. -->
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:wght@400..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>

    </noscript>
    <script>
      (function () {
        var theme
        try { theme = localStorage.getItem('regin-site-theme') } catch (e) { theme = null }
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
