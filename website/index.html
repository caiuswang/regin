    <script>
      (function () {
        var theme
        try { theme = localStorage.getItem('regin-site-theme') } catch (e) { theme = null }
        if (theme !== 'light' && theme !== 'dark') {
          theme = 'dark'
        }
        document.documentElement.setAttribute('data-theme', theme)
